services:

  # ---------------------------------------------------------------------------
  # llama.cpp serving slots — each runs on its own GPU and port.
  # Models are pulled from HuggingFace and converted to GGUF on first start,
  # then cached in ~/.cache/huggingface for subsequent runs.
  # Configure via .env: MODEL_N/PORT_N/GPU_IDS_N/GPU_LABEL_N
  #
  # For locally-converted GGUFs (run_model_list.sh sets this automatically):
  #   LOCAL_MODEL_N=/app/models/file.gguf
  # ---------------------------------------------------------------------------

  llm_1:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: ${USER}_llm_GPU_${GPU_LABEL_1}
    environment:
      - CUDA_VISIBLE_DEVICES=${GPU_IDS_1:-0}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - _LOCAL_MODEL=${LOCAL_MODEL_1:-}
      - _REPO=${MODEL_1:-}
      - _FILE=${WEIGHTS_1:-}
      - _CTX=${CTX_SIZE:-32768}
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ./models:/app/models
    ports:
      - "127.0.0.1:${PORT_1:-20001}:8080"
    entrypoint: ["/bin/sh", "-c"]
    command: ['if [ -n "$$_LOCAL_MODEL" ]; then /app/llama-server --model "$$_LOCAL_MODEL" -ngl 99 --ctx-size "$$_CTX" --host 0.0.0.0 --alias "$$_REPO"; else /app/llama-server --hf-repo "$$_REPO" --hf-file "$$_FILE" -ngl 99 --ctx-size "$$_CTX" --host 0.0.0.0 --alias "$$_REPO"; fi']
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    restart: unless-stopped

