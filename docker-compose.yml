services:

  # ---------------------------------------------------------------------------
  # llama.cpp serving slots — each runs on its own GPU and port.
  # Models are pulled from HuggingFace and converted to GGUF on first start,
  # then cached in ~/.cache/huggingface for subsequent runs.
  # Configure via .env: MODEL_N/PORT_N/GPU_IDS_N/GPU_LABEL_N
  # ---------------------------------------------------------------------------

  llm_1:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: ${USER}_llm_GPU_${GPU_LABEL_1}
    environment:
      - CUDA_VISIBLE_DEVICES=${GPU_IDS_1:-0}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "127.0.0.1:${PORT_1:-20001}:8080"
    command: >
      --hf-repo ${MODEL_1}
      --hf-file ${WEIGHTS_1}
      -ngl 99
      --ctx-size ${CTX_SIZE:-32768}
      --host 0.0.0.0
      --alias ${MODEL_1}
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    restart: unless-stopped

  llm_2:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: ${USER}_llm_GPU_${GPU_LABEL_2}
    environment:
      - CUDA_VISIBLE_DEVICES=${GPU_IDS_2:-1}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "127.0.0.1:${PORT_2:-20002}:8080"
    command: >
      --hf-repo ${MODEL_2}
      --hf-file ${WEIGHTS_2}
      -ngl 99
      --ctx-size ${CTX_SIZE:-32768}
      --host 0.0.0.0
      --alias ${MODEL_2}
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    restart: unless-stopped

  llm_3:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: ${USER}_llm_GPU_${GPU_LABEL_3}
    environment:
      - CUDA_VISIBLE_DEVICES=${GPU_IDS_3:-6}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "127.0.0.1:${PORT_3:-20003}:8080"
    command: >
      --hf-repo ${MODEL_3}
      --hf-file ${WEIGHTS_3}
      -ngl 99
      --ctx-size ${CTX_SIZE:-32768}
      --host 0.0.0.0
      --alias ${MODEL_3}
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    restart: unless-stopped

  llm_4:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: ${USER}_llm_GPU_${GPU_LABEL_4}
    environment:
      - CUDA_VISIBLE_DEVICES=${GPU_IDS_4:-7}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "127.0.0.1:${PORT_4:-20004}:8080"
    command: >
      --hf-repo ${MODEL_4}
      --hf-file ${WEIGHTS_4}
      -ngl 99
      --ctx-size ${CTX_SIZE:-32768}
      --host 0.0.0.0
      --alias ${MODEL_4}
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Eval runner — used by start_eval.sh via `docker compose run eval`.
  # ---------------------------------------------------------------------------

  eval:
    image: python:3.12-slim
    container_name: ${USER}_eval
    network_mode: host
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
      - ./logs:/app/src/logs
      - pip-cache:/root/.cache/pip
      - ~/.cache/huggingface:/root/.cache/huggingface
    working_dir: /app/src
    command: 'echo "Use: bash scripts/start_eval.sh --benchmark <name>"'

volumes:
  pip-cache:
